name: Reusable PR Review

on:
  workflow_call:
    inputs:
      target_repository:
        required: true
        type: string
      target_pr_number:
        required: true
        type: string
    secrets:
      OPENAI_API_KEY:
        required: true
      AZDO_ORG:
        required: true
      AZDO_PROJECT:
        required: true
      AZDO_PAT:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout automation repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PR review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_GITHUB_REPOSITORY: ${{ inputs.target_repository }}
          TARGET_PR_NUMBER: ${{ inputs.target_pr_number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.2
          AZDO_ORG: ${{ secrets.AZDO_ORG }}
          AZDO_PROJECT: ${{ secrets.AZDO_PROJECT }}
          AZDO_PAT: ${{ secrets.AZDO_PAT }}
        run: npm run start